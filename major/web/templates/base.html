<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ursa Major{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    {% set user = request.state.user %}
    <nav class="sidebar">
        <div class="logo">URSA MAJOR</div>
        <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/campaigns/" class="nav-link {% if active_page == 'campaigns' %}active{% endif %}">Campaigns</a>
        <a href="/sessions/" class="nav-link {% if active_page == 'sessions' %}active{% endif %}">Sessions</a>
        <a href="/tasks/" class="nav-link {% if active_page == 'tasks' %}active{% endif %}">Tasks</a>
        <a href="/files/" class="nav-link {% if active_page == 'files' %}active{% endif %}">Files</a>
        <a href="/events/" class="nav-link {% if active_page == 'events' %}active{% endif %}">Events</a>
        <a href="/governance/" class="nav-link {% if active_page == 'governance' %}active{% endif %}">Governance</a>
        {% if user and user.role == 'admin' %}
        <a href="/auth/users" class="nav-link {% if active_page == 'users' %}active{% endif %}">Users</a>
        {% endif %}
        {% if user %}
        <div style="margin-top: 16px; font-size: 12px; color: var(--text-secondary);">
            {{ user.username }} ({{ user.role }})
        </div>
        <form method="post" action="/auth/logout" style="margin-top: 8px;">
            <button type="submit" class="filter-btn">Logout</button>
        </form>
        {% endif %}
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
