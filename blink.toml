[blink]
version = "1"

[targets.homelab]
type            = "ssh"
host         = "beelink"
user            = "admin"
base            = "/home/admin/barelabs"
runtime_dir     = "/home/admin/barelabs/runtime/ursa-major"
publish_host    = "192.168.86.53"
c2_port         = "6708"
cp_port         = "6707"
image_name      = "ursa-major:local"
compose_project = "ursa-major"

# Homelab network contract:
#   - publish C2 on 192.168.86.53:6708
#   - publish the Ursa control plane on 192.168.86.53:6707 for BearClaw and MCP
#   - keep deploying both c2 and cp together; BearClaw Security depends on cp

[services.ursa-major]
description  = "Ursa Major C2 server on the blink homelab host"
service_name = "ursa-major"

[services.ursa-major.source]
type          = "containerized_local_build"
image         = "docker:cli"
mount         = ".:/workspace"
workdir       = "/workspace"
command       = "docker buildx build --platform linux/amd64 --load -t ursa-major:local . && docker tag ursa-major:local registry.home:5000/ursa-major:latest && docker push registry.home:5000/ursa-major:latest && mkdir -p dist && tar -czf dist/ursa-major-deploy.tgz deploy/"
artifact      = "dist/ursa-major-deploy.tgz"
docker_socket = true

[services.ursa-major.deploy]
target            = "homelab"
pipeline          = ["fetch_artifact", "remote_script", "stop", "backup", "install", "start", "health_check", "verify"]

[services.ursa-major.remote_script]
path = "deploy/blink/provision_ursa_major.sh"

[services.ursa-major.stop]
command = "if [ -f {{runtime_dir}}/.env ] && [ -f {{runtime_dir}}/repo/deploy/ursa-major.compose.yaml ]; then docker compose --env-file {{runtime_dir}}/.env -f {{runtime_dir}}/repo/deploy/ursa-major.compose.yaml down --remove-orphans; fi"

[services.ursa-major.install]
dest = "runtime/ursa-major/staging/ursa-major-deploy.tgz"

[services.ursa-major.start]
command = "rm -rf {{runtime_dir}}/repo && mkdir -p {{runtime_dir}}/repo && tar -xzf {{runtime_dir}}/staging/ursa-major-deploy.tgz -C {{runtime_dir}}/repo && docker pull registry.home:5000/ursa-major:latest && docker tag registry.home:5000/ursa-major:latest ursa-major:local && docker compose --env-file {{runtime_dir}}/.env -f {{runtime_dir}}/repo/deploy/ursa-major.compose.yaml up -d c2 cp"

[services.ursa-major.health_check]
url      = "https://{{publish_host}}:{{c2_port}}/health"
timeout  = 90
interval = 3

[services.ursa-major.verify]
suite = "deploy/blink/suites/ursa_major_homelab.rb"
tags = ["smoke", "health"]

[services.ursa-major.verify.tests.c2-health]
type          = "http"
url           = "https://{{publish_host}}:{{c2_port}}/health"
expect_status = 200
expect_body   = "healthy"
tags          = ["smoke", "health"]

[services.ursa-major.verify.tests.c2-container-running]
type          = "shell"
command       = "docker inspect --format '{{.State.Status}}' ursa-major-c2 2>/dev/null"
expect_output = "running"
tags          = ["health"]

[services.ursa-major.verify.tests.c2-port-published]
type          = "shell"
command       = "docker ps --filter name=^/ursa-major-c2$ --format '{{.Ports}}'"
expect_output = '/192\.168\.86\.53:6708->6708\/tcp/'
tags          = ["health"]

[services.ursa-major.verify.tests.cp-health]
type          = "http"
url           = "http://{{publish_host}}:{{cp_port}}/healthz"
expect_status = 200
expect_body   = "ursa-major-control-plane"
tags          = ["smoke", "health"]

[services.ursa-major.verify.tests.cp-port-published]
type          = "shell"
command       = "docker ps --filter name=^/ursa-major-cp$ --format '{{.Ports}}'"
expect_output = '/192\.168\.86\.53:6707->6707\/tcp/'
tags          = ["health"]

[services.ursa-major.verify.tests.cp-container-running]
type          = "shell"
command       = "docker inspect --format '{{.State.Status}}' ursa-major-cp 2>/dev/null"
expect_output = "running"
tags          = ["health"]

# ── Log aliases ───────────────────────────────────────────────────────────────
# Use `blink logs ursa-c2` and `blink logs ursa-cp` to tail each container.
# `blink deploy ursa-c2` / `blink deploy ursa-cp` prints current container status.

[services.ursa-c2]
description  = "Ursa Major C2 — log access"
service_name = "ursa-major-c2"

[services.ursa-c2.deploy]
target   = "homelab"
pipeline = ["shell"]

[services.ursa-c2.shell]
command = "echo '--- ursa.yaml ---' && cat {{runtime_dir}}/config/ursa.yaml && echo '--- port 6708 listener ---' && ss -tlnp 'sport = :6708' 2>/dev/null || netstat -tlnp 2>/dev/null | grep 6708 && echo '--- docker ps ---' && docker ps -a --filter name=ursa-major && echo '--- c2 logs ---' && docker logs --tail 60 ursa-major-c2-1 2>&1 || docker logs --tail 60 ursa-major-c2 2>&1 || echo 'no container'"

[services.ursa-c2.verify]
tags = ["diag"]

[services.ursa-c2.verify.tests.yaml-port]
type          = "shell"
command       = "python3 -c \"import json; d=json.load(open('{{runtime_dir}}/config/ursa.yaml')); print(d.get('major',{}).get('port','NOT_SET'))\""
expect_output = "6708"
tags          = ["diag"]

[services.ursa-c2.verify.tests.host-port-listening]
type          = "shell"
command       = "ss -tlnp | grep ':6708' || echo 'NOT_LISTENING'"
expect_output = "6708"
tags          = ["diag"]

[services.ursa-c2.verify.tests.c2-container-state]
type          = "shell"
command       = "docker ps -a --filter name=ursa-major-c2 --format '{{.Names}} {{.Status}} {{.Ports}}'"
expect_output = "ursa-major"
tags          = ["diag"]

[services.ursa-c2.verify.tests.c2-startup-logs]
type          = "shell"
command       = "(docker logs --tail 30 ursa-major-c2 2>&1 || docker logs --tail 30 ursa-major-c2-1 2>&1 || echo 'no_container') | strings | head -40"
expect_output = "Listening"
tags          = ["diag"]

[services.ursa-cp]
description  = "Ursa Major control plane — log access"
service_name = "ursa-major-cp"

[services.ursa-cp.deploy]
target   = "homelab"
pipeline = ["shell"]

[services.ursa-cp.shell]
command = "docker logs --tail 80 ursa-major-cp 2>/dev/null || docker logs --tail 80 ursa-major-cp-1 2>/dev/null || echo 'no container found'"
