name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test-lint-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy fastapi jinja2 uvicorn sse-starlette pyyaml

      - name: Ruff
        continue-on-error: true
        run: ruff check .

      - name: Mypy
        continue-on-error: true
        run: mypy major server.py minor/src/ursa_minor

      - name: Pytest
        run: pytest
